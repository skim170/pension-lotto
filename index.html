<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>연금복권720+ 분석 & 추천</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <div class="header-top">
        <div>
          <div class="title-row">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 320 210" role="presentation" focusable="false">
                <defs>
                  <linearGradient id="logoBoard" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#0b8f5a" />
                    <stop offset="100%" stop-color="#075f46" />
                  </linearGradient>
                  <linearGradient id="logoPaper" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#fefefe" />
                    <stop offset="100%" stop-color="#deedf7" />
                  </linearGradient>
                  <linearGradient id="logoGold" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#fff6a8" />
                    <stop offset="100%" stop-color="#ffbe13" />
                  </linearGradient>
                  <linearGradient id="logoBlue" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f0fbff" />
                    <stop offset="100%" stop-color="#5eb3ff" />
                  </linearGradient>
                  <linearGradient id="logoBanner" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#0b7a56" />
                    <stop offset="50%" stop-color="#0b604a" />
                    <stop offset="100%" stop-color="#0a3f4b" />
                  </linearGradient>
                  <radialGradient id="logoGlow" cx="50%" cy="45%" r="50%">
                    <stop offset="0%" stop-color="rgba(255,223,135,.9)" />
                    <stop offset="100%" stop-color="rgba(255,223,135,0)" />
                  </radialGradient>
                  <filter id="logoShadow" x="-30%" y="-30%" width="160%" height="180%">
                    <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0c2f30" flood-opacity=".28" />
                  </filter>
                </defs>
                <ellipse cx="160" cy="105" rx="150" ry="92" fill="url(#logoGlow)" opacity=".85" />
                <g filter="url(#logoShadow)">
                  <path d="M28 158H292C287 176 272 190 252 190H68C48 190 33 176 28 158Z" fill="#084f44" />
                  <rect x="26" y="138" width="268" height="36" rx="18" fill="url(#logoBanner)" stroke="#073745" stroke-width="4" />

                  <g transform="translate(82 20)">
                    <path d="M0 18L118 0L230 10L228 88L10 96L0 18Z" fill="url(#logoPaper)" stroke="#0a4d69" stroke-width="4" />
                    <path d="M4 12L118 0L228 10L226 34L8 36L4 12Z" fill="url(#logoBoard)" />
                    <text x="118" y="25" text-anchor="middle" font-size="22" font-weight="800" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" fill="#ffffff">연금복권</text>
                    <path d="M24 29C74 47 156 48 202 28" fill="none" stroke="#ffe45b" stroke-width="3.5" stroke-linecap="round" />
                    <text x="114" y="78" text-anchor="middle" font-size="66" font-weight="900" font-style="italic" font-family="'Arial Black','Segoe UI',sans-serif" fill="url(#logoGold)" stroke="#083b73" stroke-width="8" paint-order="stroke fill">720+</text>
                    <path d="M44 83C98 74 156 74 206 86" fill="none" stroke="#ffbf19" stroke-width="6" stroke-linecap="round" />
                  </g>

                  <g transform="translate(18 82)">
                    <ellipse cx="16" cy="36" rx="12" ry="7" fill="#855400" opacity=".26" />
                    <ellipse cx="12" cy="22" rx="10" ry="4" fill="#ffdf72" stroke="#d78f00" stroke-width="2" />
                    <rect x="2" y="12" width="20" height="20" rx="3" fill="#f8b400" stroke="#d78f00" stroke-width="2" />
                    <ellipse cx="12" cy="12" rx="10" ry="4" fill="#ffe38a" stroke="#d78f00" stroke-width="2" />
                    <ellipse cx="30" cy="40" rx="12" ry="7" fill="#855400" opacity=".26" />
                    <ellipse cx="26" cy="26" rx="10" ry="4" fill="#ffdf72" stroke="#d78f00" stroke-width="2" />
                    <rect x="16" y="16" width="20" height="20" rx="3" fill="#f8b400" stroke="#d78f00" stroke-width="2" />
                    <ellipse cx="26" cy="16" rx="10" ry="4" fill="#ffe38a" stroke="#d78f00" stroke-width="2" />
                  </g>

                  <g transform="translate(216 94)">
                    <rect x="0" y="28" width="22" height="28" rx="3" fill="#ffd62d" stroke="#d79b00" stroke-width="2" />
                    <rect x="26" y="14" width="22" height="42" rx="3" fill="#ffbe13" stroke="#d79b00" stroke-width="2" />
                    <rect x="52" y="0" width="22" height="56" rx="3" fill="#75d14e" stroke="#35954c" stroke-width="2" />
                    <path d="M2 54L34 38L56 46L78 18" fill="none" stroke="#1f8f65" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M67 20L84 14L77 31" fill="none" stroke="#1f8f65" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="26" cy="34" r="18" fill="#ffffff" opacity=".92" stroke="#12355d" stroke-width="6" />
                    <line x1="39" y1="47" x2="58" y2="63" stroke="#12355d" stroke-width="7" stroke-linecap="round" />
                  </g>

                  <g transform="translate(84 108)">
                    <g transform="translate(0 0)">
                      <circle cx="18" cy="18" r="17" fill="#2b90ff" stroke="#0b4ca8" stroke-width="3" />
                      <text x="18" y="24" text-anchor="middle" font-size="18" font-weight="900" font-family="'Arial Black','Segoe UI',sans-serif" fill="#ffffff">3</text>
                    </g>
                    <g transform="translate(26 -2)">
                      <circle cx="18" cy="18" r="17" fill="#27b552" stroke="#0d7d32" stroke-width="3" />
                      <text x="18" y="24" text-anchor="middle" font-size="18" font-weight="900" font-family="'Arial Black','Segoe UI',sans-serif" fill="#ffffff">9</text>
                    </g>
                    <g transform="translate(56 -4)">
                      <circle cx="20" cy="20" r="19" fill="#ffb11a" stroke="#c27100" stroke-width="3" />
                      <text x="20" y="27" text-anchor="middle" font-size="18" font-weight="900" font-family="'Arial Black','Segoe UI',sans-serif" fill="#ffffff">12</text>
                    </g>
                    <g transform="translate(92 -2)">
                      <circle cx="18" cy="18" r="17" fill="#ff4533" stroke="#b51e19" stroke-width="3" />
                      <text x="18" y="24" text-anchor="middle" font-size="18" font-weight="900" font-family="'Arial Black','Segoe UI',sans-serif" fill="#ffffff">27</text>
                    </g>
                    <g transform="translate(120 0)">
                      <circle cx="18" cy="18" r="17" fill="#7b53e8" stroke="#4d269f" stroke-width="3" />
                      <text x="18" y="24" text-anchor="middle" font-size="18" font-weight="900" font-family="'Arial Black','Segoe UI',sans-serif" fill="#ffffff">45</text>
                    </g>
                  </g>

                  <text x="160" y="163" text-anchor="middle" font-size="22" font-weight="900" font-family="'Noto Sans KR','Malgun Gothic',sans-serif" fill="url(#logoGold)" stroke="#083b73" stroke-width="5" paint-order="stroke fill">추천 분석</text>
                </g>
              </svg>
            </span>
            <h1>연금복권720+ 분석 & 추천</h1>
          </div>
          <p class="sub">최근 30회 당첨 데이터를 기반으로 분석하고 추천번호를 생성합니다.</p>
        </div>
        <button id="themeToggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="다크 모드로 전환">
          <span class="theme-toggle-track" aria-hidden="true">
            <span class="theme-toggle-thumb"></span>
          </span>
          <span id="themeToggleLabel" class="theme-toggle-label">라이트 모드</span>
        </button>
      </div>
    </header>

    <section class="card controls-card">
      <div class="row">
        <button id="btnLoad" class="btn primary">최근 30회 불러오기</button>
        <button id="btnRecommend" class="btn">추천번호 5개 생성</button>
        <button id="btnCopyReco" class="btn">추천번호 복사</button>
      </div>
      <p class="muted" id="status">데이터를 불러오려면 버튼을 눌러주세요.</p>
      <div class="toast" id="toast"></div>
    </section>

    <section class="grid2">
      <section class="card">
        <h2>조(1~5) 빈도</h2>
        <canvas id="chartGroup" height="150"></canvas>
        <div id="groupSummary" class="summary"></div>
      </section>

      <section class="card">
        <h2>자리별 숫자 빈도(0~9)</h2>
        <canvas id="chartDigit0" height="150"></canvas>
        <p class="muted mini">※ “십만 자리(1번째 자리)” 분포를 보여줍니다. (나머지 자리도 버튼으로 전환 가능)</p>
        <div class="row tight">
          <select id="posSelect" class="input">
            <option value="0">1번째 자리(십만)</option>
            <option value="1">2번째 자리(만)</option>
            <option value="2">3번째 자리(천)</option>
            <option value="3">4번째 자리(백)</option>
            <option value="4">5번째 자리(십)</option>
            <option value="5">6번째 자리(일)</option>
          </select>
          <button id="btnUpdatePos" class="btn">자리 변경</button>
        </div>
      </section>
    </section>

    <section class="card reco-card">
      <h2>추천번호</h2>
      <ul id="recoList" class="list"></ul>
      <p id="recoEmpty" class="muted">아직 추천번호가 없어요.</p>
    </section>

    <section class="card recent-card">
      <h2>최근 30회 결과</h2>
      <div class="tableWrap">
        <table class="table" id="recentTable">
          <thead>
            <tr>
              <th>회차</th>
              <th>날짜</th>
              <th>번호</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <footer class="footer">
      <small>⚠️ 본 추천은 통계 기반 “가중 랜덤”이며 당첨을 보장하지 않습니다.</small>
    </footer>
  </main>

  <!-- Chart.js (프레임워크 아님) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./app.js"></script>
</body>
</html>
