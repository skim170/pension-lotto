name: Update results.json

on:
  schedule:
    - cron: "15 10 * * 4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Update results.json
        run: node scripts/update-results.mjs
      - name: Validate updated site
        run: |
          node --check analytics.js
          node --check app.js
          node scripts/validate-site.mjs
      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain -- data/results.json sitemap.xml)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/results.json sitemap.xml
            git commit -m "Update results.json and sitemap"
            git push
          else
            echo "No changes."
          fi
